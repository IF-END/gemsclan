<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEMS CLAN - Diamond Tactical Squad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        :root {
            --gem-gold: #ffcc00;
            --gem-emerald: #00ffaa;
            --battle-smoke: #1a1a1e;
            --bg-deep: #08080a;
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-deep); 
            color: #f1f5f9; 
            margin: 0; 
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .font-tactical { font-family: 'Orbitron', sans-serif; }

        /* 다이아몬드 텍스처와 전장 그리드 결합 배경 */
        .battle-gem-bg {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 204, 0, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* 보석 광채 효과 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .text-shimmer {
            background: linear-gradient(90deg, #fff, var(--gem-gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }

        /* 전장의 불꽃/파편 애니메이션 */
        @keyframes spark {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(100px, -200px) scale(0); opacity: 0; }
        }
        .ember {
            position: absolute;
            background: var(--gem-gold);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            animation: spark linear infinite;
        }

        /* 다이아몬드 컷 테두리 */
        .gem-cut-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.15);
            position: relative;
            clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0% calc(100% - 10px), 0% 10px);
        }

        .gem-cut-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gem-gold), transparent);
            opacity: 0.5;
        }

        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; opacity: 0; }
        
        .vertical-text { writing-mode: vertical-lr; text-orientation: mixed; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--gem-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- 설정 ---
        const DISCORD_LINK = "https://discord.gg/WPmbqth7";
        const KAKAO_LINK = "https://open.kakao.com/o/g3kXSbhi";
        const CLAN_MASTER = "Gems_Fedora";
        // -----------

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                try { if (window.lucide) window.lucide.createIcons(); } catch (e) { console.error(e); }
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [embers, setEmbers] = useState([]);

            useEffect(() => {
                const newEmbers = Array.from({ length: 25 }).map((_, i) => ({
                    id: i,
                    left: Math.random() * 100 + '%',
                    top: Math.random() * 100 + '%',
                    size: Math.random() * 3 + 1 + 'px',
                    duration: Math.random() * 4 + 3 + 's',
                    delay: Math.random() * 5 + 's'
                }));
                setEmbers(newEmbers);
            }, []);

            return (
                <div className="min-h-screen relative selection:bg-amber-500/30 flex flex-col battle-gem-bg overflow-hidden">
                    {/* 전장 불꽃/보석 파편 레이어 */}
                    {embers.map(e => (
                        <div key={e.id} className="ember shadow-[0_0_10px_#ffcc00]" 
                             style={{ 
                                left: e.left, 
                                top: e.top,
                                width: e.size, 
                                height: e.size, 
                                animationDuration: e.duration, 
                                animationDelay: e.delay 
                             }} />
                    ))}
                    
                    {/* [사이드바] 클랜 마스터 - 럭셔리 골드 배지 */}
                    <div className="hidden lg:flex fixed left-6 xl:left-12 top-0 bottom-0 flex-col items-center justify-center gap-12 z-20 animate-fade-in-up">
                        <div className="h-32 w-px bg-gradient-to-b from-transparent via-amber-400 to-amber-600"></div>
                        
                        <div className="flex flex-col items-center gap-6 rotate-180">
                            <div className="vertical-text text-2xl xl:text-4xl font-black tracking-widest text-white uppercase italic font-tactical drop-shadow-[0_0_20px_rgba(255,204,0,0.5)]">
                                {CLAN_MASTER}
                            </div>
                            <div className="vertical-text text-[9px] xl:text-[10px] font-black tracking-[1.2em] text-amber-500/60 uppercase font-tactical">
                                SUPREME LEADER
                            </div>
                        </div>

                        <div className="h-32 w-px bg-gradient-to-t from-transparent via-amber-400 to-amber-600"></div>
                    </div>

                    {/* 네비게이션 */}
                    <nav className="relative z-30 flex justify-between items-center px-6 md:px-12 py-6 border-b border-amber-500/10 backdrop-blur-2xl sticky top-0">
                        <div className="flex items-center gap-3">
                            <Icon name="diamond" size={16} className="text-amber-400 animate-pulse" />
                            <div className="text-[11px] font-tactical font-black tracking-[0.2em] text-amber-500 uppercase">
                                GEMS Strategic Network
                            </div>
                        </div>
                        <div className="flex gap-8 text-[11px] font-tactical font-black tracking-widest text-slate-400 uppercase">
                            <span className="hover:text-amber-400 cursor-pointer transition-all hover:translate-y-[-2px]">Recruit</span>
                            <span className="hover:text-amber-400 cursor-pointer transition-all hover:translate-y-[-2px]">Tactics</span>
                            <span className="hover:text-amber-400 cursor-pointer transition-all hover:translate-y-[-2px]">Hall of Fame</span>
                        </div>
                    </nav>

                    {/* 메인 콘텐츠 */}
                    <div className="relative z-10 flex-grow w-full max-w-[1400px] mx-auto flex flex-col items-center">
                        
                        <header className="pt-24 md:pt-40 pb-20 text-center px-6 w-full max-w-4xl relative">
                            {/* 배경 데코레이션 텍스트 */}
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.04] font-tactical text-[15rem] font-black select-none pointer-events-none tracking-tighter text-white">
                                ELITE
                            </div>
                            
                            <div className="relative mb-10 group">
                                <Icon name="gem" size={64} className="text-amber-400 mb-6 drop-shadow-[0_0_30px_rgba(255,204,0,0.8)] group-hover:rotate-[360deg] transition-all duration-1000" />
                                <h1 className="text-8xl md:text-[11rem] font-black mb-0 tracking-tighter font-tactical italic leading-none text-shimmer">
                                    GEMS
                                </h1>
                                <div className="mt-4 flex items-center justify-center gap-4">
                                    <div className="h-px w-20 bg-gradient-to-r from-transparent to-amber-500/50"></div>
                                    <div className="text-xl md:text-2xl font-tactical font-bold tracking-[1em] text-amber-500/80 uppercase">Tactical Unit</div>
                                    <div className="h-px w-20 bg-gradient-to-l from-transparent to-amber-500/50"></div>
                                </div>
                            </div>
                            
                            <div className="space-y-10 animate-fade-in-up px-4">
                                <h3 className="text-3xl md:text-5xl font-black text-white leading-tight tracking-tight drop-shadow-lg">
                                    GEMS CLAN과 함께하면 <br className="sm:hidden"/> 
                                    치킨이닭!
                                </h3>
                                <p className="text-base md:text-lg text-slate-300 max-w-xl mx-auto leading-relaxed font-light">
                                    어렵게 느끼지 마세요. GEMS는 실력보다 열정을 소중히 여기며, <br className="hidden md:block"/> 
                                    당신의 잠재력을 보석처럼 빛내드립니다.
                                </p>
                            </div>
                        </header>

                        <main className="container mx-auto max-w-lg px-6 pb-32 space-y-14 w-full lg:px-12">
                            {/* 모바일 마스터 배지 */}
                            <div className="lg:hidden animate-fade-in-up text-center">
                                <div className="gem-cut-panel inline-flex flex-col items-center gap-1 px-12 py-6">
                                    <span className="text-[10px] font-tactical font-black text-amber-500 uppercase tracking-[0.5em] mb-1">Squad Commander</span>
                                    <span className="text-3xl font-tactical font-black text-white italic tracking-wider uppercase drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">{CLAN_MASTER}</span>
                                </div>
                            </div>

                            <section className="animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                                <div className="flex items-center gap-4 mb-12">
                                    <div className="h-[1px] flex-grow bg-gradient-to-r from-transparent to-amber-500/30"></div>
                                    <Icon name="crosshair" size={20} className="text-amber-500 opacity-50" />
                                    <div className="h-[1px] flex-grow bg-gradient-to-l from-transparent to-amber-500/30"></div>
                                </div>
                                
                                <div className="grid grid-cols-1 gap-5">
                                    {[
                                        { label: "Personnel", value: "나이 : 20세 이상 성인 남녀", icon: "users", color: "from-amber-600 to-yellow-400" },
                                        { label: "Growth Path", value: "딜량 : 제한없음", icon: "swords", color: "from-emerald-600 to-teal-400" },
                                        { label: "Comms Link", value: "필수사항 : 디스코드/닉네임변경", icon: "radio", color: "from-blue-600 to-cyan-400" },
                                        { label: "Battlefield", value: "Kakao Server", icon: "map", color: "from-red-600 to-orange-400" }
                                    ].map((item, i) => (
                                        <div key={i} className="gem-cut-panel group p-6 hover:translate-x-2 transition-all cursor-default overflow-hidden">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-6">
                                                    <div className={`p-3 rounded-md bg-gradient-to-br ${item.color} shadow-[0_0_15px_rgba(0,0,0,0.5)]`}>
                                                        <Icon name={item.icon} size={22} className="text-black" />
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="text-[11px] font-tactical font-black text-amber-500/50 uppercase tracking-widest mb-1">{item.label}</span>
                                                        <span className="text-lg font-bold text-white tracking-tight italic">{item.value}</span>
                                                    </div>
                                                </div>
                                                <Icon name="chevron-right" size={20} className="text-amber-500/20 group-hover:text-amber-500 transition-colors" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* 가입 신청 버튼 */}
                            <div className="space-y-6 pt-10 animate-fade-in-up" style={{ animationDelay: '0.4s' }}>
                                <div className="text-center font-tactical text-[11px] font-black tracking-[0.6em] text-slate-600 uppercase italic">Deploy to Headquarters</div>

                                <button onClick={() => window.open(DISCORD_LINK)} className="w-full group relative gem-cut-panel p-1 overflow-hidden transition-all hover:scale-[1.03] active:scale-95">
                                    <div className="bg-gradient-to-r from-indigo-900 to-indigo-700 px-8 py-6 flex items-center justify-between gap-4 font-tactical">
                                        <div className="flex items-center gap-6">
                                            <div className="w-14 h-14 rounded-lg bg-black/40 flex items-center justify-center text-white border border-white/10 group-hover:border-white/40 transition-all">
                                                <Icon name="message-square" size={28} />
                                            </div>
                                            <div className="text-left">
                                                <p className="text-[11px] font-black text-indigo-300 uppercase tracking-widest mb-1">Combat Comms</p>
                                                <span className="text-xl font-black tracking-[0.2em] text-white uppercase italic">DISCORD CHANEL</span>
                                            </div>
                                        </div>
                                        <Icon name="external-link" size={20} className="text-indigo-300/50 group-hover:text-white transition-all" />
                                    </div>
                                </button>

                                <button onClick={() => window.open(KAKAO_LINK)} className="w-full group relative gem-cut-panel p-1 overflow-hidden transition-all hover:scale-[1.03] active:scale-95">
                                    <div className="bg-gradient-to-r from-amber-600 to-amber-400 px-8 py-6 flex items-center justify-between gap-4 font-tactical text-black">
                                        <div className="flex items-center gap-6">
                                            <div className="w-14 h-14 rounded-lg bg-black/80 flex items-center justify-center text-amber-400 border border-amber-400/20 group-hover:border-amber-400 transition-all">
                                                <Icon name="message-circle" size={28} />
                                            </div>
                                            <div className="text-left">
                                                <p className="text-[11px] font-black text-black/60 uppercase tracking-widest mb-1">Direct Recruitment</p>
                                                <span className="text-xl font-black tracking-[0.2em] text-black uppercase italic">OPENTALK LINK</span>
                                            </div>
                                        </div>
                                        <Icon name="arrow-right" size={24} className="group-hover:translate-x-2 transition-all" />
                                    </div>
                                </button>
                            </div>
                        </main>
                    </div>

                    <footer className="relative z-30 py-20 text-center bg-black/90 backdrop-blur-3xl mt-auto border-t border-amber-500/10">
                        <div className="font-tactical text-[11px] font-black tracking-[1em] text-amber-500/30 uppercase mb-6">
                            GEMS // THE DIAMOND SQUAD
                        </div>
                        <div className="flex justify-center gap-4 text-[10px] text-slate-700 uppercase tracking-widest font-bold">
                            <span>Secure Connection</span>
                            <span className="text-amber-900">•</span>
                            <span>Tactical Excellence</span>
                            <span className="text-amber-900">•</span>
                            <span>© 2026 GEMS UNIT</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
