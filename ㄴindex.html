<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEMS CLAN - Tactical Squad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        :root {
            --gem-gold: #ffcc00;
            --gem-emerald: #00ffaa;
            --battle-smoke: #1a1a1e;
            --bg-deep: #08080a;
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-deep); 
            color: #f1f5f9; 
            margin: 0; 
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .font-tactical { font-family: 'Orbitron', sans-serif; }

        .battle-gem-bg {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 204, 0, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .text-shimmer {
            background: linear-gradient(90deg, #fff, var(--gem-gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }

        @keyframes spark {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(100px, -200px) scale(0); opacity: 0; }
        }
        .ember {
            position: absolute;
            background: var(--gem-gold);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            animation: spark linear infinite;
        }

        .gem-cut-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.15);
            position: relative;
            clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0% calc(100% - 10px), 0% 10px);
        }

        .gem-cut-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gem-gold), transparent);
            opacity: 0.5;
        }

        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
        
        .vertical-text { writing-mode: vertical-lr; text-orientation: mixed; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--gem-gold); border-radius: 10px; }

        .btn-hover:hover { transform: scale(1.03); }
        .btn-hover:active { transform: scale(0.95); }
        .btn-hover { transition: transform 0.15s; }

        .card-hover:hover { transform: translateX(8px); }
        .card-hover { transition: transform 0.2s; cursor: default; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const DISCORD_LINK = "https://discord.gg/WPmbqth7";
        const KAKAO_LINK = "https://open.kakao.com/o/pyLQmLAi";
        const CLAN_MASTER = "Gems_Fedora";

        function createEmbers() {
            const container = document.getElementById('app');
            for (let i = 0; i < 25; i++) {
                const ember = document.createElement('div');
                ember.className = 'ember';
                ember.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${Math.random() * 3 + 1}px;
                    height: ${Math.random() * 3 + 1}px;
                    animation-duration: ${Math.random() * 4 + 3}s;
                    animation-delay: ${Math.random() * 5}s;
                    box-shadow: 0 0 10px #ffcc00;
                `;
                container.appendChild(ember);
            }
        }

        function render() {
            document.getElementById('app').innerHTML = `
            <div class="min-h-screen relative flex flex-col battle-gem-bg overflow-hidden" style="selection-background:rgba(245,158,11,0.3)">

                <!-- 사이드바 -->
                <div class="hidden lg:flex fixed left-12 top-0 bottom-0 flex-col items-center justify-center gap-12 z-20 animate-fade-in-up">
                    <div style="height:128px;width:1px;background:linear-gradient(to bottom,transparent,#f59e0b,#d97706)"></div>
                    <div class="flex flex-col items-center gap-6" style="transform:rotate(180deg)">
                        <div class="vertical-text font-tactical font-black text-white uppercase italic" style="font-size:2rem;letter-spacing:0.2em;filter:drop-shadow(0 0 20px rgba(255,204,0,0.5))">${CLAN_MASTER}</div>
                        <div class="vertical-text font-tactical font-black" style="font-size:9px;letter-spacing:1.2em;color:rgba(245,158,11,0.6);text-transform:uppercase">SUPREME LEADER</div>
                    </div>
                    <div style="height:128px;width:1px;background:linear-gradient(to top,transparent,#f59e0b,#d97706)"></div>
                </div>

                <!-- 네비게이션 -->
                <nav class="relative z-30 flex justify-between items-center px-6 py-6 sticky top-0" style="border-bottom:1px solid rgba(245,158,11,0.1);backdrop-filter:blur(24px)">
                    <div class="flex items-center gap-3">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" class="animate-pulse"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        <div class="font-tactical font-black text-amber-500 uppercase" style="font-size:11px;letter-spacing:0.2em">GEMS Strategic Network</div>
                    </div>
                    <div class="flex gap-8 font-tactical font-black uppercase" style="font-size:11px;letter-spacing:0.15em;color:#94a3b8">
                        <span style="cursor:pointer" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='#94a3b8'">Recruit</span>
                        <span style="cursor:pointer" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='#94a3b8'">Tactics</span>
                        <span style="cursor:pointer" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='#94a3b8'">Hall of Fame</span>
                    </div>
                </nav>

                <!-- 메인 -->
                <div class="relative z-10 flex-grow w-full max-w-screen-xl mx-auto flex flex-col items-center">

                    <header class="pt-24 pb-20 text-center px-6 w-full max-w-4xl relative">
                        <div class="absolute top-1/2 left-1/2 font-tactical font-black text-white select-none pointer-events-none" style="transform:translate(-50%,-50%);opacity:0.04;font-size:15rem;letter-spacing:-0.05em">ELITE</div>

                        <div class="relative mb-10">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5" class="mx-auto mb-6" style="filter:drop-shadow(0 0 30px rgba(255,204,0,0.8))">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            <h1 class="font-tactical font-black italic leading-none text-shimmer" style="font-size:clamp(5rem,14vw,11rem);margin:0;letter-spacing:-0.05em">GEMS</h1>
                            <div class="mt-4 flex items-center justify-center gap-4">
                                <div style="height:1px;width:80px;background:linear-gradient(to right,transparent,rgba(245,158,11,0.5))"></div>
                                <div class="font-tactical font-bold text-amber-500 uppercase" style="font-size:clamp(0.9rem,2vw,1.4rem);letter-spacing:0.8em;opacity:0.8">Tactical Unit</div>
                                <div style="height:1px;width:80px;background:linear-gradient(to left,transparent,rgba(245,158,11,0.5))"></div>
                            </div>
                        </div>

                        <div class="animate-fade-in-up px-4" style="display:flex;flex-direction:column;gap:2.5rem">
                            <h3 class="font-black text-white leading-tight" style="font-size:clamp(1.6rem,4vw,3rem);letter-spacing:-0.02em">
                                GEMS CLAN과 함께하면 치킨이닭!
                            </h3>
                            <p class="text-slate-300 mx-auto font-light leading-relaxed" style="font-size:clamp(0.9rem,1.5vw,1.1rem);max-width:480px">
                                어렵게 느끼지 마세요. GEMS는 실력보다 열정을 소중히 여기며,<br>
                                당신의 잠재력을 보석처럼 빛내드립니다.
                            </p>
                        </div>
                    </header>

                    <main style="width:100%;max-width:512px;padding:0 1.5rem 8rem;display:flex;flex-direction:column;gap:3.5rem">

                        <!-- 모바일 마스터 배지 -->
                        <div class="lg:hidden animate-fade-in-up text-center">
                            <div class="gem-cut-panel inline-flex flex-col items-center gap-1 px-12 py-6">
                                <span class="font-tactical font-black text-amber-500 uppercase" style="font-size:10px;letter-spacing:0.5em;margin-bottom:4px">Squad Commander</span>
                                <span class="font-tactical font-black text-white italic uppercase" style="font-size:1.8rem;letter-spacing:0.15em;filter:drop-shadow(0 0 15px rgba(255,255,255,0.4))">${CLAN_MASTER}</span>
                            </div>
                        </div>

                        <!-- 요구사항 카드 -->
                        <section class="animate-fade-in-up" style="animation-delay:0.2s">
                            <div class="flex items-center gap-4 mb-12">
                                <div style="height:1px;flex:1;background:linear-gradient(to right,transparent,rgba(245,158,11,0.3))"></div>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(245,158,11,0.5)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
                                <div style="height:1px;flex:1;background:linear-gradient(to left,transparent,rgba(245,158,11,0.3))"></div>
                            </div>

                            <div style="display:flex;flex-direction:column;gap:1.25rem">
                                ${[
                                    { label: "Personnel", value: "나이 : 20세 이상 성인 남녀", grad: "linear-gradient(135deg,#92400e,#fbbf24)", icon: "👥" },
                                    { label: "Growth Path", value: "딜량 : 제한없음", grad: "linear-gradient(135deg,#065f46,#34d399)", icon: "⚔️" },
                                    { label: "Comms Link", value: "필수사항 : 디스코드/닉네임변경", grad: "linear-gradient(135deg,#1e3a8a,#38bdf8)", icon: "📡" },
                                    { label: "Battlefield", value: "Kakao Server", grad: "linear-gradient(135deg,#991b1b,#fb923c)", icon: "🗺️" }
                                ].map(item => `
                                    <div class="gem-cut-panel card-hover p-6" style="overflow:hidden">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-6">
                                                <div style="width:48px;height:48px;border-radius:8px;background:${item.grad};display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 15px rgba(0,0,0,0.5);flex-shrink:0">
                                                    ${item.icon}
                                                </div>
                                                <div>
                                                    <div class="font-tactical font-black text-amber-500 uppercase" style="font-size:11px;letter-spacing:0.2em;opacity:0.5;margin-bottom:4px">${item.label}</div>
                                                    <div class="font-bold text-white italic" style="font-size:1.1rem;letter-spacing:-0.01em">${item.value}</div>
                                                </div>
                                            </div>
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(245,158,11,0.2)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>

                        <!-- 버튼 -->
                        <div class="animate-fade-in-up" style="animation-delay:0.4s;display:flex;flex-direction:column;gap:1.5rem;padding-top:2.5rem">
                            <div class="text-center font-tactical font-black text-slate-600 uppercase italic" style="font-size:11px;letter-spacing:0.6em">Deploy to Headquarters</div>

                            <button onclick="window.open('${DISCORD_LINK}')" class="btn-hover w-full gem-cut-panel" style="padding:4px;border:none;cursor:pointer;background:transparent">
                                <div style="background:linear-gradient(to right,#1e1b4b,#312e81);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem">
                                    <div class="flex items-center gap-6">
                                        <div style="width:56px;height:56px;border-radius:8px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.1);font-size:28px;flex-shrink:0">💬</div>
                                        <div class="text-left">
                                            <p class="font-tactical font-black text-indigo-300 uppercase" style="font-size:11px;letter-spacing:0.2em;margin:0 0 4px">Combat Comms</p>
                                            <span class="font-tactical font-black text-white uppercase italic" style="font-size:1.2rem;letter-spacing:0.2em">DISCORD CHANEL</span>
                                        </div>
                                    </div>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(165,180,252,0.5)" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                </div>
                            </button>

                            <button onclick="window.open('${KAKAO_LINK}')" class="btn-hover w-full gem-cut-panel" style="padding:4px;border:none;cursor:pointer;background:transparent">
                                <div style="background:linear-gradient(to right,#d97706,#fbbf24);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem">
                                    <div class="flex items-center gap-6">
                                        <div style="width:56px;height:56px;border-radius:8px;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;border:1px solid rgba(251,191,36,0.2);font-size:28px;flex-shrink:0">💛</div>
                                        <div class="text-left">
                                            <p class="font-tactical font-black uppercase" style="font-size:11px;letter-spacing:0.2em;color:rgba(0,0,0,0.6);margin:0 0 4px">Direct Recruitment</p>
                                            <span class="font-tactical font-black text-black uppercase italic" style="font-size:1.2rem;letter-spacing:0.2em">카카오톡 오픈채팅</span>
                                        </div>
                                    </div>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                                </div>
                            </button>
                        </div>

                    </main>
                </div>

                <!-- 푸터 -->
                <footer class="relative z-30 py-20 text-center mt-auto" style="background:rgba(0,0,0,0.9);backdrop-filter:blur(24px);border-top:1px solid rgba(245,158,11,0.1)">
                    <div class="font-tactical font-black text-amber-500 uppercase" style="font-size:11px;letter-spacing:1em;opacity:0.3;margin-bottom:1.5rem">GEMS CLAN - Tactical Squad</div>
                    <div class="flex justify-center gap-4 font-bold uppercase" style="font-size:10px;color:#374151;letter-spacing:0.15em">
                        <span>Secure Connection</span>
                        <span style="color:#78350f">•</span>
                        <span>Tactical Excellence</span>
                        <span style="color:#78350f">•</span>
                        <span>© 2026 GEMS UNIT</span>
                    </div>
                </footer>

            </div>
            `;

            createEmbers();
        }

        render();
    </script>
</body>
</html>
